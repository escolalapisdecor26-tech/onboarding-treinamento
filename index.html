// ─── localStorage helpers ────────────────────────────────────────────────────
const STORAGE_KEY = "simulador_progresso_v1";

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function saveProgress(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

function clearProgress() {
  try { localStorage.removeItem(STORAGE_KEY); } catch {}
}

function emptyProgress() {
  return {
    m1: { done: false, scores: {}, strongCount: 0, conceptCorrect: 0, conceptTotal: 0, badges: [], dominantRole: null, completedAt: null },

  };
}

// ─── Helpers de UI ────────────────────────────────────────────────────────────
function Label({ children, color = "#888" }) {
  return (
    <div style={{ fontSize: 11, letterSpacing: 3, color, textTransform: "uppercase", fontFamily: "'Source Sans 3',sans-serif" }}>
      {children}
    </div>
  );
}

function RoleBadge({ role, delta }) {
  const r = ROLES[role];
  if (!r) return null;
  const pos = delta > 0;
  return (
    <div style={{ padding: "4px 12px", borderRadius: 20, background: pos ? `${r.color}20` : "rgba(231,76,60,0.1)", border: `1px solid ${pos ? r.color + "50" : "rgba(231,76,60,0.3)"}`, fontSize: 12, color: pos ? r.color : "#e74c3c", fontFamily: "'Source Sans 3',sans-serif" }}>
      {pos ? "+" : ""}{delta} {r.label}
    </div>
  );
}

function RoleBar({ roleKey, value, maxValue }) {
  const r = ROLES[roleKey];
  if (!r) return null;
  const pct = Math.min(100, Math.max(0, (value / maxValue) * 100));
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 7 }}>
        <div>
          <span style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 14, color: r.color, fontWeight: 600 }}>{r.label}</span>
          <span style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 12, color: "#555", marginLeft: 10 }}>{r.desc}</span>
        </div>
        <span style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 13, color: "#666" }}>{value} pts</span>
      </div>
      <div style={{ background: "rgba(255,255,255,0.07)", borderRadius: 4, height: 7, overflow: "hidden" }}>
        <div className="role-bar-fill" style={{ height: "100%", width: `${pct}%`, background: r.color, borderRadius: 4 }} />
      </div>
    </div>
  );
}

// ─── Componente de Simulação do Módulo 1 ─────────────────────────────────────
function Module1({ onComplete }) {
  const [screen, setScreen] = useState("intro");
  const [turnIndex, setTurnIndex] = useState(0);
  const [selected, setSelected] = useState(null);
  const [scores, setScores] = useState({ mediador: 0, escriba: 0, organizador: 0, incentivador: 0 });
  const [history, setHistory] = useState([]);
  const [animating, setAnimating] = useState(false);
  const [conceptIndex, setConceptIndex] = useState(0);
  const [quizAnswers, setQuizAnswers] = useState({});
  const [conceptScores, setConceptScores] = useState({ correct: 0, total: 0 });
  const feedbackRef = useRef(null);
  const conceptRef = useRef(null);

  const turn = M1_TURNS[turnIndex];
  const concept = M1_CONCEPTS[conceptIndex];
  const totalConceptQ = M1_CONCEPTS.reduce((a, c) => a + c.questions.length, 0);
  const allConceptAnswered = concept?.questions.every(q => quizAnswers[q.id]);
  const dominantRole = Object.entries(scores).sort((a, b) => b[1] - a[1])[0]?.[0];

  function handleSelect(option) {
    if (selected) return;
    setSelected(option);
    const ns = { ...scores };
    Object.entries(option.roles).forEach(([r, d]) => { ns[r] = Math.max(0, (ns[r] || 0) + d); });
    setScores(ns);
    setHistory(h => [...h, { turnId: turn.id, option }]);
    setTimeout(() => feedbackRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
  }

  function handleNext() {
    if (turnIndex < M1_TURNS.length - 1) {
      setAnimating(true);
      setTimeout(() => { setTurnIndex(t => t + 1); setSelected(null); setAnimating(false); }, 300);
    } else { setScreen("result"); }
  }

  function handleQuizAnswer(qid, opt) {
    if (quizAnswers[qid]) return;
    setQuizAnswers(a => ({ ...a, [qid]: opt }));
    if (opt.correct) setConceptScores(s => ({ correct: s.correct + 1, total: s.total + 1 }));
    else setConceptScores(s => ({ ...s, total: s.total + 1 }));
    setTimeout(() => conceptRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
  }

  function handleNextConcept() {
    if (!allConceptAnswered) return;
    if (conceptIndex < M1_CONCEPTS.length - 1) {
      setConceptIndex(c => c + 1); window.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      const strongCount = history.filter(h => h.option.quality === "strong").length;
      const earnedBadges = ALL_BADGES.filter(b => b.condition(scores)).map(b => b.id);
      onComplete({ scores, strongCount, conceptCorrect: conceptScores.correct, conceptTotal: totalConceptQ, badges: earnedBadges, dominantRole });
    }
  }

  const studentColorMap = { dominant: "#F5A623", shy: "#4A90D9", group: "#888", resistant: "#e74c3c" };
  const studentLabelMap = { dominant: "Dominador", shy: "Tímida", group: "Turma", resistant: "Resistente" };

  if (screen === "intro") return (
    <div style={{ maxWidth: 680, margin: "0 auto", padding: "60px 24px", textAlign: "center" }} className="fade-in">
      <Label color="#F5A623">Módulo 1 · Texto Coletivo</Label>
      <h1 style={{ fontFamily: "'Playfair Display',serif", fontSize: "clamp(32px,5vw,48px)", fontWeight: 900, lineHeight: 1.1, margin: "20px 0", color: "#f0ebe0" }}>
        O Professor como<br /><span style={{ color: "#F5A623" }}>Mediador</span>

        <div style={{ fontFamily: "'Playfair Display',serif", fontSize: "clamp(15px,2vw,18px)", lineHeight: 1.65, color: "#d0cbbf", marginBottom: 22, padding: "18px 0", borderBottom: "1px solid rgba(255,255,255,0.07)" }}>

        </div>
        <div style={{ display: "flex", gap: 14, alignItems: "flex-start", marginBottom: 26, background: `${c}0a`, border: `1px solid ${c}20`, borderRadius: 10, padding: "16px 18px" }}>

          <div>
            <div style={{ fontSize: 11, letterSpacing: 2, color: c, textTransform: "uppercase", fontFamily: "'Source Sans 3',sans-serif", marginBottom: 6 }}>
              {student?.name} · {studentLabelMap[student?.type]}
            </div>
            <div style={{ fontFamily: "'Georgia',serif", fontSize: 15, color: "#c8c3b7", lineHeight: 1.6, fontStyle: "italic" }}>"{turn.studentSpeech}"</div>
          </div>
        </div>
        <div style={{ marginBottom: 18 }}>
          <Label color="#555" style={{ marginBottom: 12 }}>Como você responde?</Label>
          <div style={{ height: 12 }} />
          {turn.options.map(opt => {
            const isSel = selected?.id === opt.id;
            const shown = selected !== null;
            return (
              <button key={opt.id} className="option-btn" disabled={!!selected} onClick={() => handleSelect(opt)}
                style={{ border: `1.5px solid ${shown && isSel ? qualityColors[opt.quality] : "rgba(255,255,255,0.1)"}`, background: shown && isSel ? `${qualityColors[opt.quality]}12` : "rgba(255,255,255,0.04)" }}>
                {opt.text}
              </button>
            );
          })}
        </div>
        {selected && (
          <div ref={feedbackRef} className="fade-in" style={{ background: `${qualityColors[selected.quality]}0f`, border: `1px solid ${qualityColors[selected.quality]}40`, borderRadius: 10, padding: "20px 22px", marginBottom: 22 }}>
            <div style={{ fontSize: 11, letterSpacing: 2, color: qualityColors[selected.quality], textTransform: "uppercase", fontFamily: "'Source Sans 3',sans-serif", marginBottom: 10 }}>
              {qualityLabels[selected.quality]}
            </div>
            <p style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 15, lineHeight: 1.65, color: "#c8c3b7", marginBottom: 12 }}>{selected.feedback}</p>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {Object.entries(selected.roles).map(([r, d]) => <RoleBadge key={r} role={r} delta={d} />)}
            </div>

        )}
        {selected && (
          <div style={{ textAlign: "right" }}>
            <button className="btn" onClick={handleNext} style={{ background: turnIndex < M1_TURNS.length - 1 ? "#F5A623" : "#27ae60", color: "#0f1117", padding: "12px 32px", borderRadius: 6, fontSize: 15, fontWeight: 700, fontFamily: "'Source Sans 3',sans-serif" }}>
              {turnIndex < M1_TURNS.length - 1 ? "Próxima situação →" : "Ver resultado →"}
            </button>
          </div>
        )}

  if (screen === "result") return (

      <Label color="#555">Resultado da Simulação</Label>

      <p style={{ fontFamily: "'Source Sans 3',sans-serif", color: "#666", fontSize: 14, marginBottom: 32 }}>Módulo 1 · {M1_TURNS.length} situações</p>
      <div style={{ marginBottom: 36 }}>
        {["mediador", "escriba", "organizador", "incentivador"].map(k => (
          <RoleBar key={k} roleKey={k} value={scores[k] || 0} maxValue={M1_TURNS.length * 2} />
        ))}
      </div>
      {dominantRole && (
        <div style={{ background: `${ROLES[dominantRole].color}0f`, border: `1px solid ${ROLES[dominantRole].color}30`, borderRadius: 10, padding: "18px 22px", marginBottom: 32 }}>
          <Label color={ROLES[dominantRole].color}>Papel dominante</Label>
          <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 20, color: "#f0ebe0", margin: "8px 0" }}>{ROLES[dominantRole].label}</div>
          <p style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 14, color: "#888", lineHeight: 1.6 }}>
            {dominantRole === "mediador" && "Você conduz bem a conversa. Garanta que os outros papéis também sejam ativados."}
            {dominantRole === "incentivador" && "Você prioriza a participação coletiva. Combine isso com organização das ideias."}
            {dominantRole === "organizador" && "Você estrutura bem as ideias. Verifique se não está assumindo a autoria no lugar da turma."}
            {dominantRole === "escriba" && "Você registra com cuidado, mas o texto coletivo exige mais mediação e incentivo do que transcrição."}
          </p>
        </div>
      )}
      <div style={{ padding: "18px 22px", borderRadius: 10, background: "rgba(155,89,182,0.08)", border: "1px solid rgba(155,89,182,0.25)", marginBottom: 28 }}>
        <Label color="#9B59B6">Próximo passo</Label>
        <p style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 14, color: "#bbb", lineHeight: 1.6, marginTop: 8 }}>
          Agora você vai consolidar o que vivenciou. O módulo de Conceitos Básicos apresenta os fundamentos teóricos por trás das situações que você enfrentou.
        </p>
      </div>
      <button className="btn" onClick={() => setScreen("concepts")} style={{ background: "#9B59B6", color: "#fff", padding: "13px 36px", borderRadius: 6, fontSize: 15, fontWeight: 700, fontFamily: "'Source Sans 3',sans-serif" }}>
        Ir para Conceitos →
      </button>
    </div>
  );

  if (screen === "concepts") return (
    <div style={{ maxWidth: 720, margin: "0 auto", padding: "40px 24px" }} className="fade-in">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <Label color="#9B59B6">Conceitos · {conceptIndex + 1} de {M1_CONCEPTS.length}</Label>
        <div style={{ display: "flex", gap: 5 }}>
          {M1_CONCEPTS.map((_, i) => <div key={i} style={{ width: 22, height: 4, borderRadius: 2, background: i < conceptIndex ? "#9B59B6" : i === conceptIndex ? "#fff" : "rgba(255,255,255,0.15)" }} />)}
        </div>
      </div>
      <h2 style={{ fontFamily: "'Playfair Display',serif", fontSize: "clamp(18px,3vw,28px)", fontWeight: 700, color: "#f0ebe0", margin: "16px 0 24px" }}>{concept.title}</h2>
      <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderLeft: "3px solid #9B59B6", borderRadius: 8, padding: "22px 26px", marginBottom: 28, fontFamily: "'Source Sans 3',sans-serif", fontSize: 15, color: "#c0bbb0", lineHeight: 1.8 }}>
        {concept.body.split("\n\n").map((p, i, arr) => (
          <p key={i} style={{ marginBottom: i < arr.length - 1 ? 14 : 0 }} dangerouslySetInnerHTML={{ __html: p.replace(/\*\*(.+?)\*\*/g, '<strong style="color:#e8e4d9;font-weight:600">$1</strong>') }} />
        ))}
      </div>
      <Label color="#555">Verificação de leitura</Label>
      <div style={{ height: 18 }} />
      {concept.questions.map((q, qi) => {
        const answered = quizAnswers[q.id];
        return (
          <div key={q.id} style={{ marginBottom: 28 }}>
            <p style={{ fontFamily: "'Playfair Display',serif", fontSize: 16, color: "#d0cbbf", lineHeight: 1.55, marginBottom: 14 }}>{qi + 1}. {q.text}</p>
            {q.options.map(opt => {
              const isSel = answered?.id === opt.id;
              let bc = "rgba(255,255,255,0.1)", bg = "rgba(255,255,255,0.04)";
              if (answered) {
                if (isSel && opt.correct) { bc = qualityColors.strong; bg = `${qualityColors.strong}12`; }
                if (isSel && !opt.correct) { bc = qualityColors.weak; bg = `${qualityColors.weak}12`; }
                if (!isSel && opt.correct) { bc = `${qualityColors.strong}50`; }
              }
              return <button key={opt.id} className="option-btn" disabled={!!answered} onClick={() => handleQuizAnswer(q.id, opt)} style={{ border: `1.5px solid ${bc}`, background: bg }}>{opt.text}</button>;
            })}
            {answered && (
              <div ref={qi === concept.questions.length - 1 ? conceptRef : null} className="fade-in" style={{ marginTop: 4, padding: "13px 16px", borderRadius: 8, background: answered.correct ? `${qualityColors.strong}0f` : `${qualityColors.weak}0f`, border: `1px solid ${answered.correct ? qualityColors.strong : qualityColors.weak}30` }}>
                <div style={{ fontSize: 11, letterSpacing: 2, color: answered.correct ? qualityColors.strong : qualityColors.weak, textTransform: "uppercase", fontFamily: "'Source Sans 3',sans-serif", marginBottom: 5 }}>
                  {answered.correct ? "✓ Correto" : "✗ Incorreto"}
                </div>
                <p style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 14, color: "#aaa", lineHeight: 1.6 }}>{answered.explanation}</p>
              </div>
            )}
          </div>
        );
      })}
      {allConceptAnswered && (
        <div style={{ textAlign: "right", marginTop: 8 }} className="fade-in">
          <button className="btn" onClick={handleNextConcept} style={{ background: conceptIndex < M1_CONCEPTS.length - 1 ? "#9B59B6" : "#27ae60", color: "#fff", padding: "12px 32px", borderRadius: 6, fontSize: 15, fontWeight: 700, fontFamily: "'Source Sans 3',sans-serif" }}>
            {conceptIndex < M1_CONCEPTS.length - 1 ? "Próximo conceito →" : "Concluir Módulo 1 →"}
          </button>
        </div>
      )}
    </div>
  );

  return null;
}

// ─── Componente de Simulação do Módulo 2 ─────────────────────────────────────
function Module2({ onComplete }) {
  const [screen, setScreen] = useState("intro");
  const [weekIndex, setWeekIndex] = useState(0);
  const [situIndex, setSituIndex] = useState(0);
  const [selected, setSelected] = useState(null);
  const [animating, setAnimating] = useState(false);
  const [scores, setScores] = useState({ mediador: 0, escriba: 0, organizador: 0, incentivador: 0, progressao: 0, funcao: 0 });
  const [history, setHistory] = useState([]);
  const [diaryEntries, setDiaryEntries] = useState([]);
  const [conceptIndex, setConceptIndex] = useState(0);
  const [quizAnswers, setQuizAnswers] = useState({});
  const [conceptScores, setConceptScores] = useState({ correct: 0, total: 0 });
  const feedbackRef = useRef(null);
  const conceptRef = useRef(null);

  const week = M2_WEEKS[weekIndex];
  const situ = week?.situations[situIndex];
  const concept = M2_CONCEPTS[conceptIndex];
  const isLastSitu = situIndex === week?.situations.length - 1;
  const isLastWeek = weekIndex === M2_WEEKS.length - 1;
  const totalConceptQ = M2_CONCEPTS.reduce((a, c) => a + c.questions.length, 0);
  const allConceptAnswered = concept?.questions.every(q => quizAnswers[q.id]);
  const dominantRole = Object.entries(scores).sort((a, b) => b[1] - a[1])[0]?.[0];

  const studentColorMap = { dominant: "#F5A623", shy: "#4A90D9", group: "#888" };
  const studentLabelMap = { dominant: "Dominador", shy: "Tímida", group: "Turma" };

  function handleSelect(option) {
    if (selected) return;
    setSelected(option);
    const ns = { ...scores };
    Object.entries(option.roles).forEach(([r, d]) => { ns[r] = Math.max(0, (ns[r] || 0) + d); });
    setScores(ns);
    setHistory(h => [...h, { weekId: week.id, situId: situ.id, option }]);
    setDiaryEntries(d => [...d, { weekId: week.id, weekLabel: week.weekLabel, line: option.diaryLine, quality: option.quality }]);
    setTimeout(() => feedbackRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
  }

  function handleNext() {
    if (!isLastSitu) {
      setAnimating(true);
      setTimeout(() => { setSituIndex(s => s + 1); setSelected(null); setAnimating(false); }, 300);
    } else { setSelected(null); setScreen("week-result"); }
  }

  function handleNextWeek() {
    if (!isLastWeek) { setWeekIndex(w => w + 1); setSituIndex(0); setSelected(null); setScreen("sim"); window.scrollTo({ top: 0, behavior: "smooth" }); }
    else { setScreen("result"); }
  }

  function handleQuizAnswer(qid, opt) {
    if (quizAnswers[qid]) return;
    setQuizAnswers(a => ({ ...a, [qid]: opt }));
    if (opt.correct) setConceptScores(s => ({ correct: s.correct + 1, total: s.total + 1 }));
    else setConceptScores(s => ({ ...s, total: s.total + 1 }));
    setTimeout(() => conceptRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
  }

  function handleNextConcept() {
    if (!allConceptAnswered) return;
    if (conceptIndex < M2_CONCEPTS.length - 1) { setConceptIndex(c => c + 1); window.scrollTo({ top: 0, behavior: "smooth" }); }
    else {
      const strongCount = history.filter(h => h.option.quality === "strong").length;
      const earnedBadges = ALL_BADGES.filter(b => b.condition(scores)).map(b => b.id);
      onComplete({ scores, strongCount, conceptCorrect: conceptScores.correct, conceptTotal: totalConceptQ, badges: earnedBadges, diaryEntries, dominantRole });
    }
  }

  // Diary panel
  function DiaryPanel() {
    const groups = M2_WEEKS.map(w => ({ ...w, entries: diaryEntries.filter(e => e.weekId === w.id) }));
    return (
      <div style={{ width: 240, flexShrink: 0, position: "sticky", top: 32, alignSelf: "flex-start" }}>
        <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, padding: "18px" }}>
          <Label color="#444">Diário em formação</Label>
          <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 13, color: "#666", margin: "6px 0 18px", fontStyle: "italic" }}>Animais do Cerrado</div>
          {groups.map(wg => (
            <div key={wg.id} style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 10, letterSpacing: 3, color: "#333", textTransform: "uppercase", fontFamily: "'Source Sans 3',sans-serif", marginBottom: 6 }}>{wg.weekLabel}</div>
              {wg.entries.length === 0
                ? <div style={{ height: 38, border: "1px dashed rgba(255,255,255,0.06)", borderRadius: 5, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <span style={{ fontSize: 10, color: "#2a2a2a", fontFamily: "'Source Sans 3',sans-serif" }}>aguardando…</span>
                  </div>
                : wg.entries.map((e, i) => (
                    <div key={i} style={{ padding: "8px 10px", borderRadius: 5, marginBottom: 5, background: e.quality === "strong" ? "rgba(39,174,96,0.06)" : e.quality === "medium" ? "rgba(230,126,34,0.06)" : "rgba(231,76,60,0.06)", border: `1px solid ${e.quality === "strong" ? "rgba(39,174,96,0.15)" : e.quality === "medium" ? "rgba(230,126,34,0.15)" : "rgba(231,76,60,0.15)"}`, fontSize: 11, color: "#888", lineHeight: 1.5, fontFamily: "'Georgia',serif", fontStyle: "italic", animation: "fadeIn 0.5s ease" }}>
                      {e.line}
                    </div>
                  ))
              }
            </div>
          ))}
        </div>
      </div>
    );
  }

  if (screen === "intro") return (
    <div style={{ maxWidth: 680, margin: "0 auto", padding: "60px 24px", textAlign: "center" }} className="fade-in">
      <Label color="#1ABC9C">Módulo 2 · Diário do Projeto</Label>
      <h1 style={{ fontFamily: "'Playfair Display',serif", fontSize: "clamp(30px,5vw,46px)", fontWeight: 900, lineHeight: 1.1, margin: "20px 0", color: "#f0ebe0" }}>
        Três semanas,<br /><span style={{ color: "#1ABC9C" }}>um Diário</span>
      </h1>
      <p style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 16, color: "#aaa", lineHeight: 1.7, marginBottom: 14 }}>
        Você acompanhará uma turma de 1º ano ao longo de <strong>4 sextas-feiras</strong> de um projeto sobre Animais do Cerrado. Cada decisão vai aparecer no Diário — construído em tempo real.
      </p>
      <p style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 14, color: "#666", lineHeight: 1.6, marginBottom: 36 }}>
        <strong style={{ color: "#e8e4d9" }}>8 situações</strong> · <strong style={{ color: "#e8e4d9" }}>2 novos eixos</strong> de avaliação · <strong style={{ color: "#e8e4d9" }}>2 conceitos</strong> com quiz
      </p>
      <div style={{ background: "rgba(26,188,156,0.06)", border: "1px solid rgba(26,188,156,0.15)", borderRadius: 10, padding: "16px 22px", marginBottom: 32, textAlign: "left" }}>
        <Label color="#1ABC9C">Novos eixos neste módulo</Label>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginTop: 12 }}>
          {["progressao", "funcao"].map(k => (
            <div key={k} style={{ padding: "6px 14px", borderRadius: 20, border: `1px solid ${ROLES[k].color}40`, background: `${ROLES[k].color}10`, fontSize: 13, color: ROLES[k].color, fontFamily: "'Source Sans 3',sans-serif" }}>
              {ROLES[k].label} — {ROLES[k].desc}
            </div>
          ))}
        </div>
      </div>
      <button className="btn" onClick={() => setScreen("sim")} style={{ background: "#1ABC9C", color: "#0f1117", padding: "14px 40px", borderRadius: 6, fontSize: 16, fontWeight: 700, fontFamily: "'Source Sans 3',sans-serif", letterSpacing: 1 }}>
        Começar Semana 1 →
      </button>
    </div>
  );

  if (screen === "sim" && situ) {
    const student = M2_STUDENTS.find(s => s.id === situ.studentSpeaking);
    const c = studentColorMap[student?.type] || "#888";
    return (
      <div style={{ maxWidth: 1060, margin: "0 auto", padding: "40px 24px", display: "flex", gap: 28, alignItems: "flex-start" }}>
        <div style={{ flex: 1, minWidth: 0 }} className={animating ? "" : "fade-in"}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 26 }}>
            <div>
              <Label color="#1ABC9C">{week.weekLabel} · {week.weekTitle}</Label>
              <div style={{ fontSize: 11, color: "#444", fontFamily: "'Source Sans 3',sans-serif", marginTop: 4 }}>Situação {situIndex + 1} de {week.situations.length}</div>
            </div>
            <div style={{ display: "flex", gap: 3, alignItems: "center" }}>
              {M2_WEEKS.map((w, wi) => (
                <div key={w.id} style={{ display: "flex", gap: 3, alignItems: "center" }}>
                  {wi > 0 && <div style={{ width: 6, height: 1, background: "rgba(255,255,255,0.08)" }} />}
                  {w.situations.map((s, si) => {
                    const done = wi < weekIndex || (wi === weekIndex && si < situIndex);
                    const cur = wi === weekIndex && si === situIndex;
                    return <div key={s.id} style={{ width: cur ? 18 : 12, height: 4, borderRadius: 2, background: done ? "#1ABC9C" : cur ? "#fff" : "rgba(255,255,255,0.1)", transition: "all 0.3s" }} />;
                  })}
                </div>
              ))}
            </div>
          </div>
          <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderLeft: "3px solid #1ABC9C", borderRadius: 8, padding: "13px 17px", marginBottom: 16, fontFamily: "'Source Sans 3',sans-serif", fontSize: 13, color: "#666", lineHeight: 1.6 }}>{M2_CONTEXT}</div>
          {situIndex === 0 && <div style={{ background: "rgba(26,188,156,0.05)", border: "1px solid rgba(26,188,156,0.12)", borderRadius: 8, padding: "13px 17px", marginBottom: 16, fontFamily: "'Source Sans 3',sans-serif", fontSize: 14, color: "#999", lineHeight: 1.65 }}>{week.weekIntro}</div>}
          <div style={{ fontFamily: "'Playfair Display',serif", fontSize: "clamp(14px,2vw,17px)", lineHeight: 1.65, color: "#d0cbbf", marginBottom: 20, padding: "18px 0", borderBottom: "1px solid rgba(255,255,255,0.07)" }}>{situ.situation}</div>
          <div style={{ display: "flex", gap: 13, alignItems: "flex-start", marginBottom: 24, background: `${c}0a`, border: `1px solid ${c}20`, borderRadius: 10, padding: "15px 17px" }}>
            <div style={{ fontSize: 24, flexShrink: 0 }}>{student?.avatar}</div>
            <div>
              <div style={{ fontSize: 11, letterSpacing: 2, color: c, textTransform: "uppercase", fontFamily: "'Source Sans 3',sans-serif", marginBottom: 5 }}>{student?.name} · {studentLabelMap[student?.type]}</div>
              <div style={{ fontFamily: "'Georgia',serif", fontSize: 14, color: "#c8c3b7", lineHeight: 1.6, fontStyle: "italic" }}>"{situ.studentSpeech}"</div>
            </div>
          </div>
          <div style={{ marginBottom: 16 }}>
            <Label color="#555">{situ.prompt}</Label>
            <div style={{ height: 12 }} />
            {situ.options.map(opt => {
              const isSel = selected?.id === opt.id;
              const shown = selected !== null;
              return (
                <button key={opt.id} className="option-btn" disabled={!!selected} onClick={() => handleSelect(opt)}
                  style={{ border: `1.5px solid ${shown && isSel ? qualityColors[opt.quality] : "rgba(255,255,255,0.1)"}`, background: shown && isSel ? `${qualityColors[opt.quality]}12` : "rgba(255,255,255,0.04)" }}>
                  {opt.text}
                </button>
              );
            })}
          </div>
          {selected && (
            <div ref={feedbackRef} className="fade-in" style={{ background: `${qualityColors[selected.quality]}0f`, border: `1px solid ${qualityColors[selected.quality]}40`, borderRadius: 10, padding: "18px 20px", marginBottom: 18 }}>
              <div style={{ fontSize: 11, letterSpacing: 2, color: qualityColors[selected.quality], textTransform: "uppercase", fontFamily: "'Source Sans 3',sans-serif", marginBottom: 10 }}>{qualityLabels2[selected.quality]}</div>
              <p style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 15, lineHeight: 1.65, color: "#c8c3b7", marginBottom: 12 }}>{selected.feedback}</p>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
                {Object.entries(selected.roles).map(([r, d]) => <RoleBadge key={r} role={r} delta={d} />)}
              </div>
              <div style={{ padding: "10px 12px", borderRadius: 6, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)" }}>
                <div style={{ fontSize: 10, letterSpacing: 3, color: "#333", textTransform: "uppercase", fontFamily: "'Source Sans 3',sans-serif", marginBottom: 5 }}>Adicionado ao Diário →</div>
                <div style={{ fontFamily: "'Georgia',serif", fontSize: 12, color: "#777", fontStyle: "italic", lineHeight: 1.5 }}>"{selected.diaryLine}"</div>
              </div>
            </div>
          )}
          {selected && (
            <div style={{ textAlign: "right" }}>
              <button className="btn" onClick={handleNext} style={{ background: isLastSitu ? (isLastWeek ? "#27ae60" : "#1ABC9C") : "#F5A623", color: "#0f1117", padding: "12px 30px", borderRadius: 6, fontSize: 15, fontWeight: 700, fontFamily: "'Source Sans 3',sans-serif" }}>
                {isLastSitu ? (isLastWeek ? "Ver resultado →" : `Encerrar ${week.weekLabel} →`) : "Próxima situação →"}
              </button>
            </div>
          )}
        </div>
        <DiaryPanel />
      </div>
    );
  }

  if (screen === "week-result") return (
    <div style={{ maxWidth: 1060, margin: "0 auto", padding: "50px 24px", display: "flex", gap: 28, alignItems: "flex-start" }} className="fade-in">
      <div style={{ flex: 1 }}>
        <Label color="#1ABC9C">{week.weekLabel} · Encerrada</Label>
        <h2 style={{ fontFamily: "'Playfair Display',serif", fontSize: "clamp(20px,3vw,32px)", fontWeight: 900, color: "#f0ebe0", margin: "12px 0 24px" }}>{week.weekTitle}</h2>
        <div style={{ marginBottom: 28 }}>
          <Label color="#444">O que ficou no Diário esta semana</Label>
          <div style={{ height: 14 }} />
          {diaryEntries.filter(e => e.weekId === week.id).map((e, i) => (
            <div key={i} style={{ padding: "13px 16px", borderRadius: 8, marginBottom: 8, background: e.quality === "strong" ? "rgba(39,174,96,0.06)" : e.quality === "medium" ? "rgba(230,126,34,0.06)" : "rgba(231,76,60,0.06)", border: `1px solid ${e.quality === "strong" ? "rgba(39,174,96,0.2)" : e.quality === "medium" ? "rgba(230,126,34,0.2)" : "rgba(231,76,60,0.2)"}`, fontFamily: "'Georgia',serif", fontSize: 14, color: "#c8c3b7", lineHeight: 1.65, fontStyle: "italic" }}>
              "{e.line}"
              <div style={{ marginTop: 7, fontSize: 10, color: qualityColors[e.quality], fontFamily: "'Source Sans 3',sans-serif", fontStyle: "normal", letterSpacing: 1, textTransform: "uppercase" }}>{qualityLabels2[e.quality]}</div>
            </div>
          ))}
        </div>
        <button className="btn" onClick={handleNextWeek} style={{ background: isLastWeek ? "#27ae60" : "#1ABC9C", color: "#0f1117", padding: "12px 34px", borderRadius: 6, fontSize: 15, fontWeight: 700, fontFamily: "'Source Sans 3',sans-serif" }}>
          {isLastWeek ? "Ver resultado final →" : `Ir para ${M2_WEEKS[weekIndex + 1]?.weekLabel} →`}
        </button>
      </div>
      <DiaryPanel />
    </div>
  );

  if (screen === "result") return (
    <div style={{ maxWidth: 1060, margin: "0 auto", padding: "50px 24px", display: "flex", gap: 28, alignItems: "flex-start" }} className="fade-in">
      <div style={{ flex: 1 }}>
        <Label color="#555">Resultado do Módulo 2</Label>
        <h2 style={{ fontFamily: "'Playfair Display',serif", fontSize: "clamp(22px,4vw,36px)", fontWeight: 900, color: "#f0ebe0", margin: "12px 0 6px" }}>Seu perfil de atuação</h2>
        <p style={{ fontFamily: "'Source Sans 3',sans-serif", color: "#666", fontSize: 14, marginBottom: 32 }}>4 semanas · 8 situações</p>
        <div style={{ marginBottom: 36 }}>
          {Object.keys(ROLES).map(k => <RoleBar key={k} roleKey={k} value={scores[k] || 0} maxValue={M2_WEEKS.length * 4} />)}
        </div>
        {dominantRole && (
          <div style={{ background: `${ROLES[dominantRole].color}0f`, border: `1px solid ${ROLES[dominantRole].color}30`, borderRadius: 10, padding: "18px 22px", marginBottom: 28 }}>
            <Label color={ROLES[dominantRole].color}>Papel dominante</Label>
            <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 20, color: "#f0ebe0", margin: "8px 0" }}>{ROLES[dominantRole].label}</div>
          </div>
        )}
        <div style={{ padding: "18px 22px", borderRadius: 10, background: "rgba(155,89,182,0.08)", border: "1px solid rgba(155,89,182,0.25)", marginBottom: 28 }}>
          <Label color="#9B59B6">Próximo passo</Label>
          <p style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 14, color: "#bbb", lineHeight: 1.6, marginTop: 8 }}>Consolidar os fundamentos teóricos do Diário do Projeto antes da Avaliação Final.</p>
        </div>
        <button className="btn" onClick={() => setScreen("concepts")} style={{ background: "#9B59B6", color: "#fff", padding: "13px 36px", borderRadius: 6, fontSize: 15, fontWeight: 700, fontFamily: "'Source Sans 3',sans-serif" }}>
          Ir para Conceitos →
        </button>
      </div>
      <DiaryPanel />
    </div>
  );

  if (screen === "concepts") return (
    <div style={{ maxWidth: 720, margin: "0 auto", padding: "40px 24px" }} className="fade-in">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <Label color="#9B59B6">Conceitos · {conceptIndex + 1} de {M2_CONCEPTS.length}</Label>
        <div style={{ display: "flex", gap: 5 }}>
          {M2_CONCEPTS.map((_, i) => <div key={i} style={{ width: 22, height: 4, borderRadius: 2, background: i < conceptIndex ? "#9B59B6" : i === conceptIndex ? "#fff" : "rgba(255,255,255,0.15)" }} />)}
        </div>
      </div>
      <h2 style={{ fontFamily: "'Playfair Display',serif", fontSize: "clamp(18px,3vw,28px)", fontWeight: 700, color: "#f0ebe0", margin: "16px 0 24px" }}>{concept.title}</h2>
      <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderLeft: "3px solid #9B59B6", borderRadius: 8, padding: "22px 26px", marginBottom: 28, fontFamily: "'Source Sans 3',sans-serif", fontSize: 15, color: "#c0bbb0", lineHeight: 1.8 }}>
        {concept.body.split("\n\n").map((p, i, arr) => (
          <p key={i} style={{ marginBottom: i < arr.length - 1 ? 14 : 0 }} dangerouslySetInnerHTML={{ __html: p.replace(/\*\*(.+?)\*\*/g, '<strong style="color:#e8e4d9;font-weight:600">$1</strong>') }} />
        ))}
      </div>
      <Label color="#555">Verificação de leitura</Label>
      <div style={{ height: 18 }} />
      {concept.questions.map((q, qi) => {
        const answered = quizAnswers[q.id];
        return (
          <div key={q.id} style={{ marginBottom: 28 }}>
            <p style={{ fontFamily: "'Playfair Display',serif", fontSize: 16, color: "#d0cbbf", lineHeight: 1.55, marginBottom: 14 }}>{qi + 1}. {q.text}</p>
            {q.options.map(opt => {
              const isSel = answered?.id === opt.id;
              let bc = "rgba(255,255,255,0.1)", bg = "rgba(255,255,255,0.04)";
              if (answered) {
                if (isSel && opt.correct) { bc = qualityColors.strong; bg = `${qualityColors.strong}12`; }
                if (isSel && !opt.correct) { bc = qualityColors.weak; bg = `${qualityColors.weak}12`; }
                if (!isSel && opt.correct) { bc = `${qualityColors.strong}50`; }
              }
              return <button key={opt.id} className="option-btn" disabled={!!answered} onClick={() => handleQuizAnswer(q.id, opt)} style={{ border: `1.5px solid ${bc}`, background: bg }}>{opt.text}</button>;
            })}
            {answered && (
              <div ref={qi === concept.questions.length - 1 ? conceptRef : null} className="fade-in" style={{ marginTop: 4, padding: "13px 16px", borderRadius: 8, background: answered.correct ? `${qualityColors.strong}0f` : `${qualityColors.weak}0f`, border: `1px solid ${answered.correct ? qualityColors.strong : qualityColors.weak}30` }}>
                <div style={{ fontSize: 11, letterSpacing: 2, color: answered.correct ? qualityColors.strong : qualityColors.weak, textTransform: "uppercase", fontFamily: "'Source Sans 3',sans-serif", marginBottom: 5 }}>{answered.correct ? "✓ Correto" : "✗ Incorreto"}</div>
                <p style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 14, color: "#aaa", lineHeight: 1.6 }}>{answered.explanation}</p>
              </div>
            )}
          </div>
        );
      })}
      {allConceptAnswered && (
        <div style={{ textAlign: "right", marginTop: 8 }} className="fade-in">
          <button className="btn" onClick={handleNextConcept} style={{ background: conceptIndex < M2_CONCEPTS.length - 1 ? "#9B59B6" : "#27ae60", color: "#fff", padding: "12px 32px", borderRadius: 6, fontSize: 15, fontWeight: 700, fontFamily: "'Source Sans 3',sans-serif" }}>
            {conceptIndex < M2_CONCEPTS.length - 1 ? "Próximo conceito →" : "Concluir Módulo 2 →"}
          </button>
        </div>
      )}
    </div>
  );

  return null;
}

// ─── Avaliação Final ──────────────────────────────────────────────────────────
function FinalAssessment({ m1Data, m2Data, onReset }) {
  const [screen, setScreen] = useState("intro");
  const [qIndex, setQIndex] = useState(0);
  const [answers, setAnswers] = useState({});
  const [score, setScore] = useState(0);
  const feedbackRef = useRef(null);

  const q = FINAL_QUIZ[qIndex];
  const answered = answers[q?.id];
  const allDone = FINAL_QUIZ.every(fq => answers[fq.id]);

  // Scores combinados
  const combined = {};
  Object.keys(ROLES).forEach(k => {
    combined[k] = (m1Data?.scores?.[k] || 0) + (m2Data?.scores?.[k] || 0);
  });
  const totalStrong = (m1Data?.strongCount || 0) + (m2Data?.strongCount || 0);
  const totalSituations = M1_TURNS.length + M2_WEEKS.reduce((a, w) => a + w.situations.length, 0);
  const totalConceptCorrect = (m1Data?.conceptCorrect || 0) + (m2Data?.conceptCorrect || 0);
  const totalConceptQ = (m1Data?.conceptTotal || 0) + (m2Data?.conceptTotal || 0);
  const earnedBadges = ALL_BADGES.filter(b => b.condition(combined));
  const dominantRole = Object.entries(combined).sort((a, b) => b[1] - a[1])[0]?.[0];

  // Análise cruzada
  const m1Med = m1Data?.scores?.mediador || 0;
  const m2Func = m2Data?.scores?.funcao || 0;
  const crossInsight = m1Med >= 4 && m2Func <= 1
    ? "Você foi um Mediador forte no Módulo 1, mas não ativou bem a Função Social no Módulo 2 — padrão comum em professores que dominam a mediação oral mas ainda não conectam a escrita ao destinatário real."
    : m1Med <= 1 && m2Func >= 4
    ? "Você priorizou a Função Social no Módulo 2, mas a mediação no Módulo 1 foi frágil — considere como tornar o processo de escrita mais visível e ensinável para a turma."
    : earnedBadges.length >= 3
    ? "Você demonstrou consistência pedagógica nos dois módulos. Os selos conquistados refletem uma atuação equilibrada entre mediação, incentivo e função social da escrita."
    : "Há espaço para crescimento nos dois módulos. Identifique qual eixo teve menor pontuação e revise as situações correspondentes.";

  function handleAnswer(opt) {
    if (answers[q.id]) return;
    const correct = opt.correct;
    setAnswers(a => ({ ...a, [q.id]: opt }));
    if (correct) setScore(s => s + 1);
    setTimeout(() => feedbackRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
  }

  function handleNext() {
    if (qIndex < FINAL_QUIZ.length - 1) { setQIndex(i => i + 1); window.scrollTo({ top: 0, behavior: "smooth" }); }
    else setScreen("result");
  }

  if (screen === "intro") return (
    <div style={{ maxWidth: 680, margin: "0 auto", padding: "60px 24px", textAlign: "center" }} className="fade-in">
      <Label color="#27ae60">Avaliação Final · Módulos 1 e 2</Label>
      <h1 style={{ fontFamily: "'Playfair Display',serif", fontSize: "clamp(28px,5vw,44px)", fontWeight: 900, lineHeight: 1.1, margin: "20px 0", color: "#f0ebe0" }}>
        Perfil integrado e<br /><span style={{ color: "#27ae60" }}>verificação final</span>
      </h1>
      <p style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 16, color: "#aaa", lineHeight: 1.7, marginBottom: 14 }}>
        Esta avaliação tem duas partes: um <strong>quiz de 10 perguntas</strong> que cruza os dois módulos (sem leitura prévia — é um teste de retenção), seguido de um <strong>painel de perfil unificado</strong> com análise cruzada.
      </p>
      <p style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 14, color: "#666", lineHeight: 1.6, marginBottom: 36 }}>
        Cada pergunta indica de qual módulo veio. Se errar, você saberá onde revisar.
      </p>
      <button className="btn" onClick={() => setScreen("quiz")} style={{ background: "#27ae60", color: "#fff", padding: "14px 40px", borderRadius: 6, fontSize: 16, fontWeight: 700, fontFamily: "'Source Sans 3',sans-serif", letterSpacing: 1 }}>
        Iniciar avaliação →
      </button>
    </div>
  );

  if (screen === "quiz") return (
    <div style={{ maxWidth: 720, margin: "0 auto", padding: "40px 24px" }} className="fade-in">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 28 }}>
        <div>
          <Label color="#27ae60">Questão {qIndex + 1} de {FINAL_QUIZ.length}</Label>
          <div style={{ fontSize: 11, color: "#444", fontFamily: "'Source Sans 3',sans-serif", marginTop: 4 }}>
            Módulo {q.module} · {q.module === 1 ? "Texto Coletivo" : "Diário do Projeto"}
          </div>
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          {FINAL_QUIZ.map((fq, i) => (
            <div key={fq.id} style={{ width: 16, height: 4, borderRadius: 2, background: answers[fq.id] ? (answers[fq.id].correct ? "#27ae60" : "#e74c3c") : i === qIndex ? "#fff" : "rgba(255,255,255,0.1)" }} />
          ))}
        </div>
      </div>
      <p style={{ fontFamily: "'Playfair Display',serif", fontSize: "clamp(15px,2vw,19px)", lineHeight: 1.6, color: "#d0cbbf", marginBottom: 28, padding: "20px 0", borderBottom: "1px solid rgba(255,255,255,0.07)" }}>
        {q.text}
      </p>
      {q.options.map(opt => {
        const isSel = answered?.id === opt.id;
        const shown = !!answered;
        let bc = "rgba(255,255,255,0.1)", bg = "rgba(255,255,255,0.04)";
        if (shown && isSel && opt.correct) { bc = qualityColors.strong; bg = `${qualityColors.strong}12`; }
        if (shown && isSel && !opt.correct) { bc = qualityColors.weak; bg = `${qualityColors.weak}12`; }
        if (shown && !isSel && opt.correct) { bc = `${qualityColors.strong}50`; }
        return <button key={opt.id} className="option-btn" disabled={!!answered} onClick={() => handleAnswer(opt)} style={{ border: `1.5px solid ${bc}`, background: bg }}>{opt.text}</button>;
      })}
      {answered && (
        <div ref={feedbackRef} className="fade-in" style={{ background: answered.correct ? `${qualityColors.strong}0f` : `${qualityColors.weak}0f`, border: `1px solid ${answered.correct ? qualityColors.strong : qualityColors.weak}30`, borderRadius: 10, padding: "16px 20px", marginBottom: 20 }}>
          <div style={{ fontSize: 11, letterSpacing: 2, color: answered.correct ? qualityColors.strong : qualityColors.weak, textTransform: "uppercase", fontFamily: "'Source Sans 3',sans-serif", marginBottom: 8 }}>
            {answered.correct ? "✓ Correto" : "✗ Incorreto"}
          </div>
          <p style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 14, color: "#aaa", lineHeight: 1.6 }}>{answered.explanation}</p>
          {!answered.correct && (
            <div style={{ marginTop: 10, padding: "8px 12px", borderRadius: 6, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)" }}>
              <span style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 12, color: "#555" }}>Revise: Módulo {q.module} — {q.module === 1 ? "Texto Coletivo" : "Diário do Projeto"}</span>
            </div>
          )}
        </div>
      )}
      {answered && (
        <div style={{ textAlign: "right" }}>
          <button className="btn" onClick={handleNext} style={{ background: qIndex < FINAL_QUIZ.length - 1 ? "#27ae60" : "#F5A623", color: "#0f1117", padding: "12px 30px", borderRadius: 6, fontSize: 15, fontWeight: 700, fontFamily: "'Source Sans 3',sans-serif" }}>
            {qIndex < FINAL_QUIZ.length - 1 ? "Próxima →" : "Ver perfil final →"}
          </button>
        </div>
      )}
    </div>
  );

  if (screen === "result") return (
    <div style={{ maxWidth: 720, margin: "0 auto", padding: "50px 24px" }} className="fade-in">
      <div style={{ fontSize: 48, textAlign: "center", marginBottom: 20 }}>✦</div>
      <Label color="#27ae60">Avaliação Completa</Label>
      <h2 style={{ fontFamily: "'Playfair Display',serif", fontSize: "clamp(24px,4vw,38px)", fontWeight: 900, color: "#f0ebe0", margin: "12px 0 32px" }}>
        Perfil integrado
      </h2>

      {/* Stats unificados */}
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginBottom: 36 }}>
        {[
          { label: "Ótimas decisões", value: `${totalStrong}/${totalSituations}`, color: "#F5A623" },
          { label: "Conceitos corretos", value: `${totalConceptCorrect}/${totalConceptQ}`, color: "#9B59B6" },
          { label: "Quiz final", value: `${score}/${FINAL_QUIZ.length}`, color: "#27ae60" },
          { label: "Selos", value: earnedBadges.length, color: "#1ABC9C" },
        ].map((s, i) => (
          <div key={i} style={{ padding: "14px 20px", borderRadius: 10, background: `${s.color}08`, border: `1px solid ${s.color}20`, minWidth: 130, textAlign: "center" }}>
            <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 26, color: s.color, fontWeight: 700 }}>{s.value}</div>
            <div style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 12, color: "#666", marginTop: 4 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Barras unificadas */}
      <div style={{ marginBottom: 36 }}>
        <Label color="#444">Eixos de avaliação — módulos combinados</Label>
        <div style={{ height: 18 }} />
        {Object.keys(ROLES).map(k => (
          <RoleBar key={k} roleKey={k} value={combined[k] || 0} maxValue={(M1_TURNS.length + M2_WEEKS.reduce((a, w) => a + w.situations.length, 0)) * 2} />
        ))}
      </div>

      {/* Insight cruzado */}
      <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderLeft: "3px solid #27ae60", borderRadius: 10, padding: "20px 24px", marginBottom: 32 }}>
        <Label color="#27ae60">Análise do seu perfil</Label>
        <p style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 15, color: "#c0bbb0", lineHeight: 1.7, marginTop: 12 }}>{crossInsight}</p>
      </div>

      {/* Selos */}
      {earnedBadges.length > 0 && (
        <div style={{ marginBottom: 32 }}>
          <Label color="#444">Selos conquistados</Label>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginTop: 14 }}>
            {earnedBadges.map(b => (
              <div key={b.id} style={{ padding: "13px 16px", borderRadius: 10, background: `${b.color}0f`, border: `1px solid ${b.color}30`, minWidth: 148 }}>
                <div style={{ fontSize: 22, marginBottom: 5 }}>{b.icon}</div>
                <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 13, color: b.color, marginBottom: 4 }}>{b.label}</div>
                <div style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 11, color: "#555", lineHeight: 1.5 }}>{b.desc}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Questões para revisão */}
      {FINAL_QUIZ.some(fq => !answers[fq.id]?.correct) && (
        <div style={{ marginBottom: 32 }}>
          <Label color="#e74c3c">Pontos para revisão</Label>
          <div style={{ height: 12 }} />
          {FINAL_QUIZ.filter(fq => !answers[fq.id]?.correct).map(fq => (
            <div key={fq.id} style={{ padding: "10px 14px", borderRadius: 6, marginBottom: 8, background: "rgba(231,76,60,0.05)", border: "1px solid rgba(231,76,60,0.15)" }}>
              <span style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 13, color: "#888" }}>
                Módulo {fq.module} · {fq.module === 1 ? "Texto Coletivo" : "Diário do Projeto"} — {fq.text.substring(0, 70)}…
              </span>
            </div>
          ))}
        </div>
      )}

      <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
        <button className="btn" onClick={onReset} style={{ background: "rgba(255,255,255,0.07)", color: "#e8e4d9", padding: "12px 26px", borderRadius: 6, fontSize: 14, fontFamily: "'Source Sans 3',sans-serif", border: "1px solid rgba(255,255,255,0.1)" }}>
          ↩ Voltar ao seletor
        </button>
      </div>
    </div>
  );

  return null;
}

// ─── Seletor de módulos (tela principal) ─────────────────────────────────────
function ModuleSelector({ progress, onSelect, onReset }) {
  const m1 = progress.m1;
  const m2 = progress.m2;
  const bothDone = m1.done && m2.done;

  function ModuleCard({ id, label, sub, color, accentColor, icon, done, locked, scores, strongCount, totalSituations, conceptCorrect, conceptTotal, onClick }) {
    return (
      <div onClick={!locked ? onClick : undefined} style={{ padding: "28px 28px 24px", borderRadius: 12, background: locked ? "rgba(255,255,255,0.01)" : done ? `${accentColor}06` : "rgba(255,255,255,0.03)", border: `1px solid ${locked ? "rgba(255,255,255,0.05)" : done ? `${accentColor}25` : "rgba(255,255,255,0.1)"}`, cursor: locked ? "default" : "pointer", transition: "all 0.2s", opacity: locked ? 0.4 : 1 }}
        onMouseEnter={e => { if (!locked) e.currentTarget.style.background = done ? `${accentColor}10` : "rgba(255,255,255,0.05)"; }}
        onMouseLeave={e => { if (!locked) e.currentTarget.style.background = done ? `${accentColor}06` : "rgba(255,255,255,0.03)"; }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
          <div>
            <div style={{ fontSize: 11, letterSpacing: 3, color: locked ? "#333" : accentColor, textTransform: "uppercase", fontFamily: "'Source Sans 3',sans-serif", marginBottom: 6 }}>{label}</div>
            <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 22, color: locked ? "#333" : "#f0ebe0", fontWeight: 700 }}>{sub}</div>
          </div>
          <div style={{ fontSize: 28 }}>{locked ? "🔒" : done ? "✦" : icon}</div>
        </div>
        {done && scores && (
          <div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
              {[
                { label: "Decisões ótimas", value: `${strongCount}/${totalSituations}` },
                { label: "Quiz", value: `${conceptCorrect}/${conceptTotal}` },
              ].map((s, i) => (
                <div key={i} style={{ padding: "5px 12px", borderRadius: 20, background: `${accentColor}15`, border: `1px solid ${accentColor}30`, fontSize: 12, color: accentColor, fontFamily: "'Source Sans 3',sans-serif" }}>
                  {s.value} {s.label}
                </div>
              ))}
            </div>
            {Object.keys(scores).length > 0 && (
              <div style={{ display: "flex", gap: 4 }}>
                {Object.entries(scores).slice(0, 4).map(([k, v]) => {
                  const maxV = (id === "m1" ? M1_TURNS.length : M2_WEEKS.reduce((a, w) => a + w.situations.length, 0)) * 2;
                  const pct = Math.min(100, Math.max(0, (v / maxV) * 100));
                  return (
                    <div key={k} style={{ flex: 1 }}>
                      <div style={{ background: "rgba(255,255,255,0.05)", borderRadius: 2, height: 3, overflow: "hidden" }}>
                        <div style={{ height: "100%", width: `${pct}%`, background: ROLES[k]?.color || "#888", borderRadius: 2 }} />
                      </div>
                      <div style={{ fontSize: 9, color: "#444", fontFamily: "'Source Sans 3',sans-serif", marginTop: 3, textAlign: "center" }}>{ROLES[k]?.label?.slice(0, 3)}</div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
        {!done && !locked && (
          <div style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 13, color: "#555", lineHeight: 1.6 }}>
            {id === "m1" && "8 situações · 3 conceitos · 12 perguntas de quiz"}
            {id === "m2" && "4 semanas · 8 situações · 2 conceitos · 8 perguntas de quiz"}
            {id === "final" && "10 questões integradas · perfil unificado · análise cruzada"}
          </div>
        )}
        {!done && !locked && (
          <div style={{ marginTop: 16, display: "inline-block", padding: "8px 18px", borderRadius: 6, background: accentColor, color: "#0f1117", fontSize: 13, fontWeight: 700, fontFamily: "'Source Sans 3',sans-serif" }}>
            {id === "m1" ? "Iniciar" : id === "m2" ? "Iniciar" : "Iniciar avaliação"} →
          </div>
        )}
        {done && (
          <div style={{ marginTop: 14, fontSize: 12, color: "#444", fontFamily: "'Source Sans 3',sans-serif" }}>
            Concluído · <span style={{ color: accentColor, cursor: "pointer" }} onClick={e => { e.stopPropagation(); onClick(); }}>Refazer</span>
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{ maxWidth: 760, margin: "0 auto", padding: "60px 24px" }} className="fade-in">
      <div style={{ textAlign: "center", marginBottom: 48 }}>
        <Label color="#888">Simulador de Formação Docente</Label>
        <h1 style={{ fontFamily: "'Playfair Display',serif", fontSize: "clamp(28px,5vw,48px)", fontWeight: 900, lineHeight: 1.1, margin: "18px 0 14px", color: "#f0ebe0" }}>
          Produção Textual<br /><span style={{ color: "#F5A623" }}>nos Anos Iniciais</span>
        </h1>
        <p style={{ fontFamily: "'Source Sans 3',sans-serif", fontSize: 16, color: "#666", lineHeight: 1.7, maxWidth: 520, margin: "0 auto" }}>
          Dois módulos de simulação com feedback imediato, conceitos teóricos e uma avaliação integrada ao final.
        </p>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <ModuleCard id="m1" label="Módulo 1" sub="Texto Coletivo" accentColor="#F5A623" icon="✍️"
          done={m1.done} locked={false} scores={m1.scores} strongCount={m1.strongCount}
          totalSituations={M1_TURNS.length} conceptCorrect={m1.conceptCorrect} conceptTotal={m1.conceptTotal}
          onClick={() => onSelect("m1")} />
        <ModuleCard id="m2" label="Módulo 2" sub="Diário do Projeto" accentColor="#1ABC9C" icon="📒"
          done={m2.done} locked={false} scores={m2.scores} strongCount={m2.strongCount}
          totalSituations={M2_WEEKS.reduce((a, w) => a + w.situations.length, 0)} conceptCorrect={m2.conceptCorrect} conceptTotal={m2.conceptTotal}
          onClick={() => onSelect("m2")} />
        <ModuleCard id="final" label="Avaliação Final" sub="Perfil Integrado" accentColor="#27ae60" icon="🏁"
          done={false} locked={!bothDone} scores={null}
          onClick={() => onSelect("final")} />
      </div>

      {(m1.done || m2.done) && (
        <div style={{ marginTop: 32, textAlign: "center" }}>
          <button className="btn" onClick={onReset} style={{ background: "transparent", color: "#444", padding: "8px 16px", borderRadius: 6, fontSize: 12, fontFamily: "'Source Sans 3',sans-serif", border: "1px solid rgba(255,255,255,0.06)", cursor: "pointer" }}>
            Limpar progresso salvo
          </button>
        </div>
      )}
    </div>
  );
}

// ─── App raiz ─────────────────────────────────────────────────────────────────
function App() {
  const [activeModule, setActiveModule] = useState(null); // null | "m1" | "m2" | "final"
  const [progress, setProgress] = useState(() => loadProgress() || emptyProgress());

  // Persiste sempre que progress muda
  useEffect(() => { saveProgress(progress); }, [progress]);

  function handleM1Complete(data) {
    setProgress(p => ({ ...p, m1: { done: true, ...data, completedAt: new Date().toISOString() } }));
    setActiveModule(null);
  }

  function handleM2Complete(data) {
    setProgress(p => ({ ...p, m2: { done: true, ...data, completedAt: new Date().toISOString() } }));
    setActiveModule(null);
  }

  function handleReset() {
    clearProgress();
    setProgress(emptyProgress());
    setActiveModule(null);
  }

  return (
    <div style={{ minHeight: "100vh", background: "#0f1117", color: "#e8e4d9", fontFamily: "'Georgia','Times New Roman',serif" }}>
      <style>{GLOBAL_CSS}</style>

      {/* Navbar mínima */}
      {activeModule && (
        <div style={{ position: "sticky", top: 0, zIndex: 100, background: "rgba(15,17,23,0.92)", backdropFilter: "blur(8px)", borderBottom: "1px solid rgba(255,255,255,0.06)", padding: "12px 24px", display: "flex", alignItems: "center", gap: 16 }}>
          <button className="btn" onClick={() => setActiveModule(null)} style={{ background: "rgba(255,255,255,0.06)", color: "#888", padding: "6px 14px", borderRadius: 5, fontSize: 12, fontFamily: "'Source Sans 3',sans-serif", border: "1px solid rgba(255,255,255,0.08)" }}>
            ← Módulos
          </button>
          <span style={{ fontSize: 12, color: "#444", fontFamily: "'Source Sans 3',sans-serif", letterSpacing: 2, textTransform: "uppercase" }}>
            {activeModule === "m1" && "Módulo 1 · Texto Coletivo"}
            {activeModule === "m2" && "Módulo 2 · Diário do Projeto"}
            {activeModule === "final" && "Avaliação Final"}
          </span>
        </div>
      )}

      {!activeModule && (
        <ModuleSelector progress={progress} onSelect={setActiveModule} onReset={handleReset} />
      )}
      {activeModule === "m1" && (
        <Module1 onComplete={handleM1Complete} />
      )}
      {activeModule === "m2" && (
        <Module2 onComplete={handleM2Complete} />
      )}
      {activeModule === "final" && progress.m1.done && progress.m2.done && (
        <FinalAssessment m1Data={progress.m1} m2Data={progress.m2} onReset={() => setActiveModule(null)} />
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
